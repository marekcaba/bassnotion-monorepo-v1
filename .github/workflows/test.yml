name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Nightly run so e2e still catches regressions even when it doesn't
  # gate PRs. 03:00 UTC = ~04:00 CEST (off-hours for the team).
  schedule:
    - cron: '0 3 * * *'
  # Manual trigger so a risky PR can opt back into e2e on demand.
  # From the GitHub UI: Actions → Test Suite → Run workflow → pick branch.
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # NestJS DI errors + mock/real interface drift + assertion drift from
      # the drum-pattern-editor baseline merge that bypassed CI. The step is
      # marked continue-on-error so failures report but don't block PRs.
      # (continue-on-error at the *job* level keeps the workflow running but
      # still marks the job conclusion as failure — must be on the step.)
      - name: Run backend tests
        continue-on-error: true
        run: pnpm run test:backend
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=4096'

  test-frontend-playback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # 290 failures across 30 files, dominated by audio test infrastructure
      # gaps (jsdom IndexedDB polyfill, incomplete Tone.js/AudioContext mocks,
      # missing NEXT_PUBLIC_SUPABASE_URL in setup). Non-blocking until fixed.
      - name: Run playback domain tests
        continue-on-error: true
        run: pnpm run test:frontend:playback
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=6144'

  test-frontend-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # ~30 failures across 4 files: missing QueryClientProvider wrapper in
      # use-user-profile.test.ts; mockFetch interception not taking effect in
      # profile.test.ts; minor module/log assertions. Non-blocking until fixed.
      - name: Run user domain tests
        continue-on-error: true
        run: pnpm run test:frontend:user
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=2048'

  test-frontend-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # 3 failures in TechniqueRendererPlugin.test.ts: tests assert on
      # console.error but the production code now routes errors through
      # createStructuredLogger. Non-blocking until tests are updated.
      - name: Run shared domain tests
        continue-on-error: true
        run: pnpm run test:frontend:shared
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=2048'

  # E2E does NOT run on pull_request — it's the bottleneck that drags
  # every PR to 20+ minutes (Playwright install + ~50 specs with
  # baseline-merge timeout rot). Instead:
  #
  #   - Runs on push to main/develop, so post-merge regressions are
  #     caught on the same commit that introduced them.
  #   - Runs nightly via cron so we still get coverage on slow drift
  #     between merges.
  #   - Can be triggered manually for a PR via workflow_dispatch if
  #     a change is risky enough to warrant pre-merge e2e.
  #
  # The Deploy workflow's separate health-gate + smoke jobs still gate
  # production deploys (curl-based, fast). E2E is purely a regression
  # net here, not a release gate. Revisit when the test suite is
  # rehabilitated and worth running pre-merge.
  test-e2e:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # ~50+ Playwright specs hang on per-spec timeouts (baseline-merge
      # rot). Soft-fail + hard 25-min cap so the job doesn't run for an
      # hour waiting for timeouts to compound.
      - name: Run E2E tests
        continue-on-error: true
        timeout-minutes: 25
        run: pnpm run test:e2e
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=4096'
