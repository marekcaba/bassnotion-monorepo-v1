name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Disable Nx Cloud — the workspace was never claimed at cloud.nx.app and
# Nx refuses to run after the 3-day grace window. See ci.yml for context.
env:
  NX_CLOUD_ACCESS_TOKEN: ''
  NX_NO_CLOUD: 'true'
  NX_DAEMON: 'false'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # NestJS DI errors + mock/real interface drift + assertion drift from
      # the drum-pattern-editor baseline merge that bypassed CI. The step is
      # marked continue-on-error so failures report but don't block PRs.
      # (continue-on-error at the *job* level keeps the workflow running but
      # still marks the job conclusion as failure — must be on the step.)
      - name: Run backend tests
        continue-on-error: true
        run: pnpm run test:backend
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=4096'

  test-frontend-playback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # 290 failures across 30 files, dominated by audio test infrastructure
      # gaps (jsdom IndexedDB polyfill, incomplete Tone.js/AudioContext mocks,
      # missing NEXT_PUBLIC_SUPABASE_URL in setup). Non-blocking until fixed.
      - name: Run playback domain tests
        continue-on-error: true
        run: pnpm run test:frontend:playback
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=6144'

  test-frontend-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # ~30 failures across 4 files: missing QueryClientProvider wrapper in
      # use-user-profile.test.ts; mockFetch interception not taking effect in
      # profile.test.ts; minor module/log assertions. Non-blocking until fixed.
      - name: Run user domain tests
        continue-on-error: true
        run: pnpm run test:frontend:user
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=2048'

  test-frontend-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # 3 failures in TechniqueRendererPlugin.test.ts: tests assert on
      # console.error but the production code now routes errors through
      # createStructuredLogger. Non-blocking until tests are updated.
      - name: Run shared domain tests
        continue-on-error: true
        run: pnpm run test:frontend:shared
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=2048'

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=4096'
