name: Deploy

# Orchestrates a deploy — it does NOT trigger one.
#
# Railway and Vercel each auto-deploy on push via their own GitHub
# integrations (develop -> staging, main -> production). Having Actions
# *also* run a deploy command would double-build. So this workflow only
# sequences and gates around those integrations:
#
#   1. migrate     — push Supabase migrations to the matching project
#   2. health-gate — wait until the Railway backend reports healthy
#   3. smoke       — run @smoke Playwright specs against the live URLs
#
# develop -> staging project/URLs. main -> production project/URLs, with
# the migrate job gated behind the `production` environment's manual
# approval. Any job failing halts the rest.

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    # main -> `production` requires manual approval (configured on the
    # GitHub environment). develop -> `staging` runs unattended.
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    outputs:
      target: ${{ steps.target.outputs.target }}
    steps:
      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
          else
            echo "target=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not `latest`): `latest` queries the GitHub API on every run
          # to resolve the newest release, which gets rate-limited on CI runners
          # ("Failed to resolve latest Supabase CLI release: rate limit
          # exceeded"). A pinned version skips that lookup → deterministic CI.
          version: 2.72.7

      - name: Push migrations to ${{ steps.target.outputs.target }} Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_PROJECT_REF_PROD || secrets.SUPABASE_PROJECT_REF_STAGING }}
          DB_PASSWORD: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_DB_PASSWORD_PROD || secrets.SUPABASE_DB_PASSWORD_STAGING }}
        run: |
          supabase link --project-ref "$PROJECT_REF" --password "$DB_PASSWORD"
          supabase db push --linked --password "$DB_PASSWORD"

  health-gate:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for ${{ needs.migrate.outputs.target }} backend to deploy THIS commit + report healthy
        env:
          BACKEND_URL: ${{ github.ref == 'refs/heads/main' && vars.BACKEND_URL_PROD || vars.BACKEND_URL_STAGING }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          echo "Polling $BACKEND_URL/api/health for commit $EXPECTED_SHA ..."
          # Gate on TWO things, not just liveness:
          #   1. top-level status == "healthy"
          #   2. the running image's commit == this workflow's commit (github.sha)
          # (2) is what catches the recurring Railway false-green: the OLD image
          # answers /api/health 200 while a new build lags or never triggers, so
          # a liveness-only gate passes against stale code. Asserting the commit
          # means "the NEW image is actually live" — a lagging/stuck build now
          # fails the gate instead of silently shipping nothing.
          #
          # GRACE: if the backend reports commit "unknown" (env var not set —
          # e.g. off-Railway, or before RAILWAY_GIT_COMMIT_SHA is wired), we
          # can't verify the SHA, so fall back to healthy-only with a warning
          # rather than block the deploy on a config gap.
          for i in $(seq 1 60); do
            body=$(curl -fsS --max-time 10 "$BACKEND_URL/api/health" || true)
            top_status=$(echo "$body" | jq -r '.status // empty' 2>/dev/null || true)
            running_sha=$(echo "$body" | jq -r '.commit // empty' 2>/dev/null || true)
            if [ "$top_status" = "healthy" ]; then
              # Prefix-tolerant match: Railway may report a full OR short SHA, so
              # compare on the shorter of the two (min 7 chars) rather than exact
              # equality — else a short-vs-full mismatch would fail forever.
              n=7
              [ "${#running_sha}" -lt "$n" ] && n=${#running_sha}
              if [ -n "$running_sha" ] && [ "$running_sha" != "unknown" ] && \
                 [ "${EXPECTED_SHA:0:$n}" = "${running_sha:0:$n}" ]; then
                echo "Backend healthy AND running $running_sha after $i attempt(s)."
                echo "$body"
                exit 0
              fi
              if [ "$running_sha" = "unknown" ] || [ -z "$running_sha" ]; then
                echo "::warning::Backend healthy but reports commit '${running_sha:-<none>}' \
                  — cannot verify the deployed SHA. Accepting (healthy-only fallback). \
                  Wire RAILWAY_GIT_COMMIT_SHA to enable strict commit verification."
                echo "$body"
                exit 0
              fi
              echo "Attempt $i: healthy but STALE image (running ${running_sha:0:8}, want ${EXPECTED_SHA:0:8}) — new build not live yet, retrying in 10s..."
            else
              echo "Attempt $i: not healthy yet (status: ${top_status:-unknown}), retrying in 10s..."
            fi
            sleep 10
          done
          echo "::error::Backend did not deploy commit $EXPECTED_SHA (and report healthy) within 10 minutes. The new image likely failed to build or Railway's deploy didn't trigger — check the Railway dashboard."
          exit 1

  smoke:
    needs: [migrate, health-gate]
    runs-on: ubuntu-latest
    # The smoke job is a post-deploy sanity check: did the deploy break
    # the obvious stuff? Two HTTP checks is enough — anything deeper
    # belongs in CI on the PR before merge, not blocking the deploy gate.
    #
    # Used to run @smoke Playwright specs, but the full install
    # (Node + pnpm + 2,299 packages + chromium + Ubuntu deps) took 30+
    # min on cold runners and routinely wedged. curl gives the same
    # answer in seconds without a runtime.
    steps:
      - name: Check homepage is reachable
        env:
          BASE_URL: ${{ github.ref == 'refs/heads/main' && vars.FRONTEND_URL_PROD || vars.FRONTEND_URL_STAGING }}
        run: |
          echo "GET $BASE_URL"
          status=$(curl -fsS --retry 3 --retry-delay 5 --max-time 30 -o /dev/null -w "%{http_code}" "$BASE_URL")
          if [ "$status" != "200" ]; then
            echo "::error::Homepage returned HTTP $status (expected 200)"
            exit 1
          fi
          echo "Homepage OK ($status)"

      - name: Check backend /api/health is healthy
        env:
          API_URL: ${{ github.ref == 'refs/heads/main' && vars.BACKEND_URL_PROD || vars.BACKEND_URL_STAGING }}
        run: |
          echo "GET $API_URL/api/health"
          body=$(curl -fsS --retry 3 --retry-delay 5 --max-time 30 "$API_URL/api/health")
          echo "Response: $body"
          # Top-level "status":"healthy" only — see comment in health-gate.
          top_status=$(echo "$body" | jq -r '.status // empty' 2>/dev/null || true)
          if [ "$top_status" != "healthy" ]; then
            echo "::error::Backend /api/health did not report healthy (top-level status: ${top_status:-unknown})"
            exit 1
          fi
          echo "Backend healthy"

  summary:
    needs: [migrate, health-gate, smoke]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create deployment summary
        run: |
          echo "## Deploy — ${{ needs.migrate.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Migrations**: ${{ needs.migrate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Health gate**: ${{ needs.health-gate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke test**: ${{ needs.smoke.result }}" >> $GITHUB_STEP_SUMMARY
