name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Security: fail only on critical CVEs. The remaining high/moderate
      # vulns are known transitive ReDoS in build tooling (see the
      # production-readiness plan, Phase 1.5) — tracked, not blocking.
      - name: Security audit
        run: pnpm audit --audit-level critical

      - name: Set up Nx SHAs
        uses: nrwl/nx-set-shas@v4

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: npx nx-cloud record -- echo Hello World
      # Nx Affected runs only tasks affected by the changes in this PR/commit. Learn more: https://nx.dev/ci/features/affected
      #
      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # The drum-pattern-editor baseline merge brought ~17k lint problems
      # into develop. `pnpm lint:fix` auto-fixes ~10k (Prettier) but leaves
      # ~7k real errors (unused vars, no-console, custom rules) that need
      # a dedicated cleanup pass. Soft-fail until that lands.
      - name: Lint
        continue-on-error: true
        run: npx nx affected -t lint

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # ~30 TS errors in frontend-e2e specs (stale Window typings, missing
      # module declarations) and apps/backend/billing tests (Stripe type
      # mismatches, missing jest.Mocked namespace). Same baseline-merge
      # rot as Lint. Soft-fail until cleanup lands.
      - name: Type check
        continue-on-error: true
        run: npx nx affected -t typecheck

      # Tracked-broken — see "Test suite rehabilitation" follow-up.
      # `nx affected -t test` reaches the same broken playback/user/backend
      # suites already quarantined in test.yml. Same baseline-merge rot.
      # Soft-fail so Build / E2E downstream can run.
      - name: Test
        continue-on-error: true
        run: npx nx affected -t test

      - name: Build
        run: npx nx affected -t build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        run: npx nx affected -t e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: dist/apps/frontend-e2e/html-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            dist/apps/frontend-e2e/test-results/
            dist/apps/frontend-e2e/junit.xml
          retention-days: 30
