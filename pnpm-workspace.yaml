packages:
  - apps/*
  - libs/*
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - nx
overrides:
  esbuild@<0.28.1: '>=0.28.1'
  koa@<2.16.4: '>=2.16.4'
  # Critical CVEs — fixed 2026-05-12 (Phase 1.2)
  # @fastify/middie auth bypass: GHSA-72c6-fx6q-fr5w
  '@fastify/middie@<9.3.2': '>=9.3.2'
  # form-data unsafe random boundary GHSA-fjxv-7rqg-78g4 + CRLF injection
  # GHSA-hmw2-7cc7-3qxx. Dev-only via Nx > @module-federation > axios > form-data.
  form-data@<4.0.6: '>=4.0.6'
  # shell-quote newline-escape bypass: GHSA-w7jw-789q-3m8p (critical). Dev-only,
  # deep transitive: @nx/webpack > webpack-dev-server > launch-editor > shell-quote
  # (opens the editor on a dev-server error). Force the patched line.
  shell-quote@<1.8.4: '>=1.8.4'
  # Pin @babel/core to a single version so Next.js resolves to ONE build
  # instance. The lucide-react 0->1 bump (commit 3cebcd44) pulled in a
  # transitive @babel/core@7.29.7 alongside the existing 7.28.x, which forked
  # `next` into two peer-resolved copies. Next's static-export <Html>/
  # workUnitAsyncStorage guards do module-identity checks that fail with a
  # duplicate Next, breaking `nx build` prerender with the misleading
  # "<Html> should not be imported outside of pages/_document". One babel-core
  # version => one Next => prerender passes. Revisit if intentionally bumping next/babel.
  '@babel/core@>=7.0.0': '7.28.5'
  # ── Audit hygiene 2026-06-13 (Phase 4 launch-readiness) ──────────────────
  # Every entry below is a DEV/BUILD-TOOLING transitive dep — NONE is in any
  # production `dependencies` block (verified: the deployed Vercel/Railway
  # bundles don't include them). Each resolves under @nx/* (devkit, webpack,
  # vite, next, eslint) or the bundler/sass toolchain. We force the patched
  # line so `pnpm audit --audit-level high` is clean; this is hygiene to pass
  # the gate, not a production-risk fix (the prod risk was already nil).
  axios@<1.15.1: '>=1.15.1'                       # DoS/proto-pollution/proxy — via @nx > axios (dev)
  node-forge@<1.4.0: '>=1.4.0'                     # ASN.1/sig forgery — via @nx/webpack > selfsigned (dev TLS)
  # minimatch is pulled at three major lines (3.x via glob, 9.x via @nx/devkit
  # + typescript-eslint, 10.x via newer @nx). Each needs its OWN patched floor —
  # a single low floor leaves 9.x/10.x untouched. All dev/build tooling.
  minimatch@<3.1.4: '>=3.1.4'
  minimatch@>=9.0.0 <9.0.7: '>=9.0.7'
  minimatch@>=10.0.0 <10.2.3: '>=10.2.3'
  '@isaacs/brace-expansion@<5.0.1': '>=5.0.1'      # ReDoS — minimatch dep
  rollup@<4.59.0: '>=4.59.0'                       # path-traversal file write — via vite (build)
  serialize-javascript@<7.0.3: '>=7.0.3'           # RCE — webpack/terser (build)
  svgo@<3.3.3: '>=3.3.3'                            # DoS entity expansion — svg loader (build)
  flatted@<3.4.2: '>=3.4.2'                         # proto-pollution/DoS — @nx module-federation (dev)
  path-to-regexp@<8.4.0: '>=8.4.0'                 # ReDoS — router tooling (dev)
  # picomatch at the 2.x line (>=2.3.2) AND the 4.x line (>=4.0.4, via
  # tinyglobby / @rollup/pluginutils). Both dev/build tooling.
  picomatch@<2.3.2: '>=2.3.2'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'
  lodash@<4.18.0: '>=4.18.0'                        # _.template code injection — build tooling
  '@xmldom/xmldom@<0.8.12': '>=0.8.12'             # XML injection — svg/xml tooling (build)
  fast-uri@<3.1.1: '>=3.1.1'                        # path-traversal/host-confusion — fastify dev tooling
  immutable@<5.1.5: '>=5.1.5'                       # proto-pollution — @nx/webpack > sass (build)
  tmp@<0.2.6: '>=0.2.6'                             # path-traversal — @nx/esbuild (dev)
  '@babel/plugin-transform-modules-systemjs@<7.29.4': '>=7.29.4'  # via babel build tooling
  # ── Audit hygiene 2026-06-29 (advisory drift since 2026-06-13) ────────────
  # New advisories on EXISTING transitive deps — none introduced by app code, and
  # (as the 06-13 block notes) every entry below is DEV/BUILD TOOLING that does NOT
  # ship in the deployed Vercel/Railway bundle. Resolves under @nx/* (next, react,
  # webpack-dev-server, module-federation), the vite/rollup toolchain, eslint/
  # commitlint, or native-compile (node-gyp). The two prod-path exceptions are
  # noted inline. We force the patched line to keep `pnpm audit` clean.
  #
  # ws — memory-exhaustion DoS GHSA-96hv-2xvq-fx4p + uninit-memory GHSA-58qx-3vcg-4xpx.
  # Two lines: 7.x via @next/bundle-analyzer (build), 8.x via @nx module-federation
  # + the backend dev server. (No prod ws path — runtime uses Fastify's own.)
  ws@>=7.0.0 <7.5.11: '>=7.5.11'
  ws@>=8.0.0 <8.21.0: '>=8.21.0'
  # vite fs.deny bypass GHSA-fx2h-pf6j-xcff + launch-editor NTLM GHSA-v6wh-96g9-6wx3.
  # PIN to EXACTLY 6.4.3 (the patched line AND the latest 6.x) — NOT '>=6.4.3',
  # which let pnpm jump to vite 8 and break @nx/* (CLAUDE.md vite@6 pin).
  vite@>=6.0.0 <6.4.3: '6.4.3'
  launch-editor@<2.14.1: '>=2.14.1'                # webpack-dev-server (dev)
  # http-proxy-middleware: CRLF GHSA-gcq2-9pq2-cxqm + host-routing GHSA-64mm-vxmg-q3vj.
  # 2.x via @nx/webpack > webpack-dev-server, 3.x via @nx/next > @nx/react (dev).
  http-proxy-middleware@<2.0.10: '>=2.0.10'
  http-proxy-middleware@>=3.0.0 <3.0.7: '>=3.0.7'
  follow-redirects@<1.16.0: '>=1.16.0'             # header leak — http-proxy (dev)
  webpack-dev-server@<5.2.5: '>=5.2.5'             # src exposure + HMR MITM (dev)
  # undici DoS GHSA-vxpw-j846-p89q + header-injection GHSA-p88m-4jfj-68fv — via
  # opensheetmusicdisplay > gl > node-gyp (native-compile only; not bundled).
  undici@<6.27.0: '>=6.27.0'
  tar@<7.5.16: '>=7.5.16'                          # file smuggling — node-gyp (build)
  postcss@<8.5.10: '>=8.5.10'                      # XSS in stringify — next build CSS
  uuid@<11.1.1: '>=11.1.1'                         # buffer bounds — webpack-dev-server/xstate inspect (dev)
  # js-yaml proto-pollution GHSA-mh29-5h37-fv8m — bump the 3.x and 4.x lines to the
  # proto-pollution patch. (The SEPARATE quadratic-DoS GHSA-h67p, patched only at
  # 4.2.0+, is ignored below: forcing 4.2.0 onto the @istanbuljs/load-nyc-config
  # path fights the resolver, and that path is a dev-only jest-coverage config
  # loader reading OUR OWN trusted YAML — zero attacker-input exposure.)
  js-yaml@<3.14.2: '>=3.14.2'
  js-yaml@>=4.0.0 <4.1.1: '>=4.1.1'
  yaml@>=2.0.0 <2.8.3: '>=2.8.3'                   # stack overflow — nx + tailwind postcss (build)
  # ajv ReDoS GHSA-2g4f-4pwh-qvx6 — 6.x via file-loader, 8.x via commitlint +
  # api-extractor (build/dev).
  ajv@<6.14.0: '>=6.14.0'
  ajv@>=7.0.0 <8.18.0: '>=8.18.0'
  # qs DoS GHSA-6rw7-vpxm-498p / GHSA-q8mj-m7cp-5q26. Paths: express (@nx, dev) AND
  # stripe (BACKEND RUNTIME). qs is API-compatible across this patch, and the
  # backend never qs-parses untrusted bracket-notation bodies (Fastify owns body
  # parsing) — forcing the patched line is safe + closes the one prod path.
  qs@>=6.11.1 <6.15.2: '>=6.15.2'
  # @opentelemetry/core unbounded baggage GHSA-8988-4f7v-96qf — via @sentry/node
  # (BACKEND RUNTIME). Patched line is drop-in within the OTel 2.x core.
  '@opentelemetry/core@<2.8.0': '>=2.8.0'
auditConfig:
  ignoreGhsas:
    # vitest <4.1.0 — Vitest UI server arbitrary file read/exec (dev-only).
    # GHSA-5xrq-8626-4rwp. Exploit requires the UI/Browser-mode server to be
    # listening AND exposed to the network (--api.host) or run on Windows; CI
    # runs `vitest run` on Linux with no UI/network binding, so exposure is nil.
    # Ignored 2026-06-02 — revisit when migrating to vitest 4.
    - GHSA-5xrq-8626-4rwp
    # js-yaml quadratic-DoS via repeated merge-key aliases — GHSA-h67p-54hq-rp68.
    # ONLY patched at js-yaml >=4.2.0, on the @nx/jest > @istanbuljs/load-nyc-config
    # path (a DEV-only coverage config loader that parses OUR OWN trusted .nycrc, never
    # attacker-supplied YAML). Forcing 4.2.0 onto that ^4.0.0 dep fights the resolver;
    # exposure is nil. Ignored 2026-06-29 — drops when @istanbuljs ships js-yaml@4.2.0.
    - GHSA-h67p-54hq-rp68
    # (fastify <5.7.2 Content-Type bypass GHSA-jx2c-rxcm-jvmq was waived here
    # until 2026-06-13; now FIXED outright by migrating the backend to
    # fastify@5.8.5 — no waiver needed. Aligns with @nestjs/platform-fastify@11,
    # which already targets Fastify 5. The only breaking-change touch point was
    # request.routerPath → request.routeOptions.url in rate-limit.guard.ts; the
    # @fastify/* plugins were already on their Fastify-5 majors.)
patchedDependencies:
  # signalsmith-stretch — adds a `swapAtLoopStart` worklet method for the
  # sample-accurate "Lines & Fills" bassline swap (replaces the looping PCM the
  # instant the read-head wraps to loopStart). See patches/ for the diff.
  signalsmith-stretch@1.3.2: patches/signalsmith-stretch@1.3.2.patch
