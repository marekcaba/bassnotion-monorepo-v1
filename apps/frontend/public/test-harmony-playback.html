<!DOCTYPE html>
<html>
<head>
  <title>Harmony Playback Path Diagnostic</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
    button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
    .output { background: #000; padding: 10px; margin: 10px 0; border: 1px solid #0f0; }
    h1 { color: #0ff; }
    .error { color: #f00; }
    .success { color: #0f0; }
    .info { color: #ff0; }
  </style>
</head>
<body>
  <h1>🎹 Harmony Audio Path Diagnostic</h1>

  <p>This page tests which audio path is actually being used for harmony playback.</p>

  <div>
    <button onclick="testDirectPlayback()">Test Direct WamKeyboard Playback</button>
    <button onclick="testRegionProcessorPath()">Test RegionProcessor Path</button>
    <button onclick="checkAudioContext()">Check AudioContext</button>
    <button onclick="clearConsole()">Clear Console</button>
  </div>

  <div class="output" id="output"></div>

  <script>
    const output = document.getElementById('output');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
      output.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
      console.log(`[DIAGNOSTIC] ${message}`);
    }

    function clearConsole() {
      output.innerHTML = '';
      console.clear();
      log('Console cleared', 'info');
    }

    async function checkAudioContext() {
      log('🔍 Checking AudioContext...', 'info');

      const coreServices = window.__globalCoreServices || window.__coreServices;
      if (!coreServices) {
        log('❌ CoreServices not found on window', 'error');
        return;
      }

      log('✅ CoreServices found', 'success');

      const audioContext = coreServices.getAudioContext?.();
      if (!audioContext) {
        log('❌ AudioContext not available', 'error');
        return;
      }

      log(`✅ AudioContext state: ${audioContext.state}`, 'success');
      log(`   Sample rate: ${audioContext.sampleRate}Hz`, 'info');
      log(`   Current time: ${audioContext.currentTime.toFixed(3)}s`, 'info');
    }

    async function testDirectPlayback() {
      log('🎹 Testing Direct WamKeyboard Playback...', 'info');

      const coreServices = window.__globalCoreServices || window.__coreServices;
      if (!coreServices) {
        log('❌ CoreServices not available', 'error');
        return;
      }

      const pluginManager = coreServices.getPluginManager();
      if (!pluginManager) {
        log('❌ PluginManager not available', 'error');
        return;
      }

      log('✅ PluginManager found', 'success');

      try {
        const keyboardPlugin = pluginManager.getPlugin('wam-keyboard');
        if (!keyboardPlugin) {
          log('❌ WamKeyboardPlugin not registered', 'error');
          return;
        }

        log('✅ WamKeyboardPlugin found', 'success');
        log(`   State: ${keyboardPlugin.state}`, 'info');

        const wamKeyboard = keyboardPlugin.getWamKeyboard();
        if (!wamKeyboard) {
          log('❌ WamKeyboard instance not initialized', 'error');
          return;
        }

        log('✅ WamKeyboard instance found', 'success');
        log(`   Current instrument: ${wamKeyboard.audioNode?.currentInstrument}`, 'info');

        // Trigger a test note (C4, MIDI 60)
        log('🎵 Triggering test note C4 (MIDI 60) with velocity 80...', 'info');
        log('   Check console for [PLAYBACK-PATH] logs!', 'info');

        wamKeyboard.audioNode?.triggerNote(60, 80);

        setTimeout(() => {
          wamKeyboard.audioNode?.releaseNote(60);
          log('🔇 Released test note', 'info');
        }, 1000);

      } catch (error) {
        log(`❌ Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    async function testRegionProcessorPath() {
      log('🎵 Testing RegionProcessor Path...', 'info');
      log('   This test checks if RegionProcessor can schedule harmony notes', 'info');

      const coreServices = window.__globalCoreServices || window.__coreServices;
      if (!coreServices) {
        log('❌ CoreServices not available', 'error');
        return;
      }

      const regionProcessor = coreServices.getRegionProcessor?.();
      if (!regionProcessor) {
        log('❌ RegionProcessor not available', 'error');
        return;
      }

      log('✅ RegionProcessor found', 'success');

      // Check if harmony track exists
      const tracks = regionProcessor.tracks;
      const harmonyTracks = Array.from(tracks.values()).filter(t => t.instrumentType === 'harmony');

      if (harmonyTracks.length === 0) {
        log('⚠️ No harmony tracks registered in RegionProcessor', 'info');
      } else {
        log(`✅ Found ${harmonyTracks.length} harmony track(s)`, 'success');
        harmonyTracks.forEach((track, idx) => {
          log(`   Track ${idx + 1}: ${track.name} (${track.trackId})`, 'info');
        });
      }

      log('   Check console for 🚨🚨🚨 scheduleHarmonyDirect() ENTRY logs!', 'info');
    }

    // Auto-check on load
    window.addEventListener('load', () => {
      log('📊 Diagnostic page loaded', 'success');
      log('   Open browser console to see detailed logs', 'info');
      log('   Click buttons above to test different audio paths', 'info');
      checkAudioContext();
    });
  </script>
</body>
</html>
